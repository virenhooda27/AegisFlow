version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegisflow-postgres
    environment:
      POSTGRES_DB: aegisflow
      POSTGRES_USER: aegisflow
      POSTGRES_PASSWORD: aegisflow
    ports:
      - "5432:5432"
    volumes:
      - aegisflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aegisflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aegisflow-pgdata:
