server:
  port: 8080

spring:
  application:
    name: aegisflow

  datasource:
    url: jdbc:postgresql://localhost:5432/aegisflow
    username: aegisflow
    password: aegisflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

aegisflow:
  llm:
    provider: mock

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
